# Datapace Agent v2 — Quickstart
#
# 1. Copy config/agent.example.toml to agent.toml and edit postgres.url
# 2. docker-compose up -d
#
# Web UI: http://localhost:7080

services:
  datapace-agent:
    build: .
    container_name: datapace-agent
    volumes:
      - ./agent.toml:/app/agent.toml:ro
      - agent_data:/data
    ports:
      - "7080:7080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Development database (use with --profile dev)
  postgres:
    image: postgres:16-alpine
    container_name: datapace-dev-db
    profiles:
      - dev
    environment:
      POSTGRES_USER: datapace
      POSTGRES_PASSWORD: datapace
      POSTGRES_DB: datapace_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dev-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapace -d datapace_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agent_data:
  postgres_data:
